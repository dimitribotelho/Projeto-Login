<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>
            <div id="formulario">
                <h1>login</h1>
                <p>Seja bem-vindo(a) novamente, faça o login para acessar sua conta.</p>
                <form action="login.php" method="post">
                    <div class="campo">
                        <span>👤</span>
                        <input type="email" name="login" id="ilogin" required placeholder="seu e-mail" autocomplete="email">
                        <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                        <span>🔑</span>
                        <input type="password" name="senha" id="isenha" required autocomplete="current-password" placeholder="sua senha" minlength="8">
                        <label for="isenha">Senha</label>
                    </div>
                    <div>
                        <input type="submit" value="enviar">
                        <button class="botao">Esqueci minha senha</button>
                    </div>
                </form>

            </div>
        </section>
    </main>
    
</body>
</html>
